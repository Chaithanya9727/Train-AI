services:
  # 🌐 MODULE: FRONTEND (Next.js)
  - type: web
    name: train-ai-frontend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.x
      # Point to your backend URL (Render will provide this)
      - key: NEXT_PUBLIC_BACKEND_URL
        value: https://train-ai-backend.onrender.com

  # 🤖 MODULE: BACKEND (FastAPI AI Engine)
  - type: web
    name: train-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn api.index:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
